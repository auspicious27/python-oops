<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Python OOP Notes</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --paper: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --border: #d8dee8;
      --accent: #2563eb;
      --code-bg: #0f172a;
      --code-text: #e5e7eb;
      --table-head: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.7;
    }

    .topbar {
      background: #111827;
      color: white;
      padding: 18px 24px;
      border-bottom: 4px solid var(--accent);
    }

    .topbar-inner,
    main {
      max-width: 1120px;
      margin: 0 auto;
    }

    .topbar h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }

    .topbar p {
      margin: 6px 0 0;
      color: #d1d5db;
      font-size: 15px;
    }

    main {
      padding: 28px 18px 48px;
    }

    .doc-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }

    .doc-card strong {
      display: block;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .doc-card span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    article {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1,
    h2,
    h3 {
      line-height: 1.25;
      color: #111827;
    }

    h1 {
      font-size: 34px;
      margin-top: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    h2 {
      margin-top: 34px;
      font-size: 25px;
    }

    h3 {
      margin-top: 26px;
      font-size: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      display: block;
      overflow-x: auto;
    }

    th,
    td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--table-head);
      font-weight: 700;
    }

    code {
      background: #eef2f7;
      border-radius: 4px;
      padding: 2px 5px;
      font-family: Consolas, Monaco, "Courier New", monospace;
      font-size: 0.95em;
    }

    pre {
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }

    pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }

    hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    .loading,
    .error {
      color: var(--muted);
      font-size: 18px;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 700px) {
      .topbar {
        padding: 16px;
      }

      .topbar h1 {
        font-size: 20px;
      }

      main {
        padding: 16px 12px 32px;
      }

      article {
        padding: 18px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>Python OOP Notes</h1>
      <p>Module 12: Classes, objects, constructors, inheritance, encapsulation and Bank Account System</p>
    </div>
  </header>

  <main>
    <section class="doc-card" aria-label="Current notes document">
      <strong>Module 12: Object-Oriented Programming</strong>
      <span>Structured Hinglish notes with theory, examples, output and detailed line-by-line code explanation.</span>
    </section>

    <article id="content">
      <p class="loading">Loading notes...</p>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const content = document.getElementById("content");

    marked.setOptions({
      gfm: true,
      breaks: false
    });

    fetch("module_12_oop_notes.md")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Notes file could not be loaded.");
        }
        return response.text();
      })
      .then((markdown) => {
        content.innerHTML = marked.parse(markdown);
      })
      .catch((error) => {
        content.innerHTML = `
          <h1>Notes could not be loaded</h1>
          <p class="error">${error.message}</p>
          <p>Please check that module_12_oop_notes.md exists in this repository.</p>
        `;
      });
  </script>
</body>
</html>
